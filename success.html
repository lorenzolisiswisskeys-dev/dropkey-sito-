<!DOCTYPE html>
<html lang="it">
<head>

<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>

  a{color:#E8B44C; text-decoration:none; font-weight:600;}
</style>
</head>
<body>
  <div class="box">
    <div class="check">✓</div>
    <h1>Pagamento ricevuto</h1>
    <p>Grazie per il tuo ordine! Stiamo recuperando il tuo codice dal fornitore: arriverà via email entro pochi minuti.</p>
    <p style="margin-top:22px;"><a href="./dropkey-store.html">← Torna al negozio</a></p>
  </div>
